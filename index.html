<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROT-JS</title>
  </head>
  <body>
    <main id="app" aria-label="Jogo em terminal">
      <section class="game-stage">
        <header class="game-header">
          <h1>ROT-JS</h1>
          <div class="game-actions">
            <label for="seed">Seed</label>
            <input id="seed" data-testid="seed" type="text" inputmode="numeric" pattern="[0-9]*" value="1979" />
            <button id="regen" data-testid="regen-map" type="button">Novo</button>
          </div>
        </header>

        <div id="rot-display" class="game-screen" aria-label="Mapa da caverna"></div>

        <footer class="game-footer">
          <span>WASD</span>
          <span>SETAS</span>
        </footer>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
